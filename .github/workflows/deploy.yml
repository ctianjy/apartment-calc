name: Test and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Render notebooks to HTML
        run: |
          mkdir -p public
          jupyter nbconvert --to html --execute notebooks/*.ipynb --output-dir=public/
      - name: Build index page
        run: |
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head><title>Apartment Analysis</title>
          <style>
            body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1rem; line-height: 1.6; color: #222; }
            a { color: #185FA5; text-decoration: none; }
            a:hover { text-decoration: underline; }
            h1 { font-weight: 500; }
            ul { padding-left: 1.25rem; }
            li { margin: 0.5rem 0; }
            .note { color: #666; font-size: 0.9rem; margin-top: 2rem; }
          </style></head><body>
          <h1>Apartment hunting analysis</h1>
          <p>Rendered Jupyter notebooks — auto-updated on each push to main.</p>
          <ul>
            <li><a href="01_single_property_analysis.html">Single property deep dive</a></li>
            <li><a href="02_multi_property_comparison.html">Multi-property comparison</a></li>
            <li><a href="03_monte_carlo.html">Monte Carlo simulation</a></li>
          </ul>
          <p class="note">Source: <a href="https://github.com/">GitHub repo</a></p>
          </body></html>
          EOF
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
